name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Floating newest stable, the current latest release pinned so its
        # coverage survives a future stable bump, and the crate's MSRV.
        toolchain: [stable, "1.97", "1.86"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - name: Test (unit + offline + security)
        run: cargo test --all-features

  live:
    # Live conformance hits the real API and consumes quota. It runs only on the
    # default branch / manual dispatch, and only when the key secret is present.
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Live conformance
        env:
          API2CONVERT_API_KEY: ${{ secrets.API2CONVERT_API_KEY }}
        run: |
          if [ -z "$API2CONVERT_API_KEY" ]; then
            echo "API2CONVERT_API_KEY not set; skipping live conformance."
            exit 0
          fi
          cargo test --test live -- --ignored --nocapture
