name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # for crates.io Trusted Publishing (OIDC)

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Verify the crate version matches the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 \
            | grep -o '"name":"api2convert","version":"[^"]*"' \
            | grep -o '"version":"[^"]*"' | cut -d'"' -f4)"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: Guardrail
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features

      # Preferred: mint a short-lived token via crates.io Trusted Publishing (OIDC).
      # Configure the trusted publisher on crates.io (repo + this workflow) to enable it.
      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
        continue-on-error: true

      - name: Publish to crates.io
        env:
          # OIDC token when Trusted Publishing is configured; otherwise the stored
          # CARGO_REGISTRY_TOKEN secret (which can be removed once OIDC is set up).
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
